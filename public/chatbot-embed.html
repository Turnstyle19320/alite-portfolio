<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALITE Chat</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Calibri, 'Segoe UI', Arial, sans-serif; background: transparent; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    /* Floating button */
    #chat-toggle {
      position: fixed; bottom: 24px; right: 24px; z-index: 1000;
      width: 56px; height: 56px; border-radius: 50%; border: none;
      background: #001d55; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,29,85,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #chat-toggle:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 24px rgba(0,29,85,0.4);
    }
    #chat-toggle .close { color: #fff; font-size: 22px; line-height: 1; display: none; }
    #chat-toggle.open .close { display: block; }
    #chat-toggle.open .avatar { display: none; }

    /* Chat window */
    #chat-window {
      position: fixed; bottom: 92px; right: 24px; z-index: 999;
      width: 360px; max-width: calc(100vw - 48px);
      height: 480px; max-height: calc(100vh - 140px);
      border-radius: 14px; overflow: hidden;
      background: #fff; border: 1px solid #e0dcd6;
      box-shadow: 0 12px 48px rgba(0,29,85,0.15);
      display: none; flex-direction: column;
      animation: fadein 0.25s ease-out;
    }
    #chat-window.open { display: flex; }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(12px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-4px); }
    }

    /* Header */
    #chat-header {
      padding: 14px 16px; background: #001d55;
      display: flex; align-items: center; gap: 10; flex-shrink: 0;
    }
    #chat-header .name {
      font-family: Cambria, Georgia, serif; font-size: 14px;
      color: #fff; font-weight: 700;
    }
    #chat-header .sub {
      font-size: 11px; color: rgba(255,255,255,0.6);
    }

    /* Messages */
    #chat-messages {
      flex: 1; overflow-y: auto; padding: 16px 14px;
      display: flex; flex-direction: column; gap: 12;
      background: #FAFAF8;
    }
    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }
    .bubble {
      max-width: 82%; padding: 10px 14px;
      font-size: 13.5px; line-height: 1.6; white-space: pre-wrap;
    }
    .msg.user .bubble {
      background: #15616f; color: #fff;
      border-radius: 14px 14px 4px 14px;
    }
    .msg.assistant .bubble {
      background: #fff; color: #1a1a2e;
      border: 1px solid #e0dcd6;
      border-radius: 14px 14px 14px 4px;
    }

    /* Typing indicator */
    .typing { display: flex; gap: 4; padding: 8px 0; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #5c5c6e; display: block;
    }
    .typing span:nth-child(1) { animation: bounce 1.2s 0s infinite; }
    .typing span:nth-child(2) { animation: bounce 1.2s 0.2s infinite; }
    .typing span:nth-child(3) { animation: bounce 1.2s 0.4s infinite; }

    /* Input */
    #chat-form {
      padding: 10px 12px; border-top: 1px solid #e0dcd6;
      display: flex; gap: 8; background: #fff; flex-shrink: 0;
    }
    #chat-input {
      flex: 1; padding: 10px 14px; border-radius: 8px;
      border: 1px solid #e0dcd6; font-family: inherit;
      font-size: 14px; color: #1a1a2e; background: #FAFAF8;
      outline: none; transition: border-color 0.2s;
    }
    #chat-input:focus { border-color: #15616f; }
    #chat-send {
      padding: 10px 16px; border-radius: 8px; border: none;
      background: #15616f; color: #fff; font-family: inherit;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.2s; flex-shrink: 0;
    }
    #chat-send:disabled { background: #e0dcd6; cursor: default; }
  </style>
</head>
<body>

<!-- Agent Smith SVG -->
<svg id="smith-svg" width="36" height="36" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
  <ellipse cx="24" cy="44" rx="16" ry="8" fill="#1a1a2e"/>
  <path d="M20 36 L24 40 L28 36" fill="white" stroke="white" stroke-width="0.5"/>
  <path d="M23.5 36 L24 42 L24.5 36" fill="#001d55"/>
  <ellipse cx="24" cy="22" rx="9" ry="10" fill="#e8d5b7"/>
  <rect x="15.5" y="19" width="7" height="5" rx="1" fill="#111"/>
  <rect x="25.5" y="19" width="7" height="5" rx="1" fill="#111"/>
  <line x1="22.5" y1="21" x2="25.5" y2="21" stroke="#111" stroke-width="1"/>
  <line x1="15.5" y1="21" x2="13" y2="19.5" stroke="#111" stroke-width="0.8"/>
  <line x1="32.5" y1="21" x2="35" y2="19.5" stroke="#111" stroke-width="0.8"/>
  <rect x="16.5" y="19.5" width="2" height="1" rx="0.5" fill="#333" opacity="0.5"/>
  <rect x="26.5" y="19.5" width="2" height="1" rx="0.5" fill="#333" opacity="0.5"/>
  <path d="M15 20 Q15 12 24 11 Q33 12 33 20 Q33 16 24 14 Q15 16 15 20Z" fill="#2a2a2a"/>
  <path d="M21 27 Q24 29 27 27" fill="none" stroke="#8b6f5a" stroke-width="0.8"/>
  <circle cx="14" cy="23" r="1" fill="#333"/>
  <path d="M14 24 L13 28" stroke="#333" stroke-width="0.5"/>
</svg>

<button id="chat-toggle" aria-label="Open chat">
  <span class="avatar"></span>
  <span class="close">&times;</span>
</button>

<div id="chat-window">
  <div id="chat-header">
    <div>
      <div class="name">Agent Smith</div>
      <div class="sub">ALITE Portfolio Assistant</div>
    </div>
  </div>
  <div id="chat-messages"></div>
  <form id="chat-form">
    <label for="chat-input" class="sr-only">Type a message</label>
    <input id="chat-input" type="text" placeholder="Ask Agent Smith..." autocomplete="off" />
    <button id="chat-send" type="submit" aria-label="Send message">Send</button>
  </form>
</div>

<script src="chatbot-embed.js"></script>
</body>
</html>
